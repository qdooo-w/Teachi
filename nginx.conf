#Learnova 前后端部署 Nginx 配置 {PROJECT_ROOT}要记得修正为绝对路径
# 后端 FastAPI → 127.0.0.1:8000
# 前端静态文件 → frontend/dist/

# ─── Upstream 定义 ───────────────────────────────────────────────────────────

upstream backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ─── HTTP → HTTPS 重定向 ────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── HTTPS 主服务 ───────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # 前端静态资源
    root {PROJECT_ROOT}/frontend/dist;
    index index.html;

    # 全局上传大小限制（附件上传 40MB + 余量）
    client_max_body_size 50m;

    # ── SSL/TLS ──────────────────────────────────────────────────────────

    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── 安全头 ───────────────────────────────────────────────────────────

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip 压缩 ────────────────────────────────────────────────────────

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ═══════════════════════════════════════════════════════════════════════
    # 纯 API 路由：始终代理到后端，不与前端 SPA 路由冲突
    # ═══════════════════════════════════════════════════════════════════════

    # Auth（注册/登录/刷新/登出/用户信息）
    location /auth {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 聊天流式接口 —— 必须关闭缓冲
    location /loop {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE 核心：关闭缓冲以支持实时打字机效果
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # 模型响应可能较慢，超时延长至 10 分钟
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 用户级资源（仅 API，无前端路由冲突）
    location /users {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 消息版本管理
    location /messages {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 工具注册表
    location /tools {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 用户设置中心（模型配置/账号/偏好）
    location /settings {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ═══════════════════════════════════════════════════════════════════════
    # 混合路由：既是前端 SPA 页面路由，也是后端 API 路径
    #
    # 策略：检查 Accept 请求头
    #   - text/html  → 浏览器页面导航，返回 index.html（SPA 接管）
    #   - 其他        → fetch/XHR API 调用，代理到后端
    # ═══════════════════════════════════════════════════════════════════════

    # 项目、会话、社区、仓库（SPA 页面 + API）
    location ~ ^/(projects|sessions|community|library) {
        # 浏览器刷新 / 直接访问 → SPA 回退
        if ($http_accept ~* "text/html") {
            rewrite ^ /index.html last;
        }

        proxy_pass http://backend;

        # 涉及文件上传的路径，关闭请求体缓冲避免大文件 OOM
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 附件上传 / ZIP 上传超时延长
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ═══════════════════════════════════════════════════════════════════════
    # 前端 SPA 兜底
    # ═══════════════════════════════════════════════════════════════════════

    location / {
        try_files $uri $uri/ /index.html;
    }
}
